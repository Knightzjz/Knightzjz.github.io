<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>0x194 — Blog | Ji-Zhe Zhou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating coffee beans */
    .beans {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bean {
      position: absolute;
      font-size: 1.6rem;
      opacity: 0.12;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.12; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      text-align: center;
      z-index: 1;
      padding: 2rem;
    }

    .code {
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #2563eb 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      user-select: none;
    }

    .subtitle {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }

    .desc {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: #64748b;
      margin-bottom: 2.5rem;
      max-width: 420px;
      line-height: 1.6;
    }

    .coffee-mug {
      display: inline-block;
      margin-bottom: 2rem;
      animation: sip 3s ease-in-out infinite;
    }
    @keyframes sip {
      0%, 100% { transform: rotate(0deg); }
      15%  { transform: rotate(-15deg); }
      30%  { transform: rotate(0deg); }
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.6rem;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .cta:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .hint {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: #94a3b8;
      font-style: italic;
    }
    .hint em {
      font-style: normal;
      color: #64748b;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <!-- Floating coffee beans -->
  <div class="beans" id="beans"></div>

  <div class="container">
    <div class="coffee-mug">☕</div>
    <div class="code">0x194</div>
    <p class="subtitle">Blog Coming Soon</p>
    <p class="desc">The blog you're looking for hasn't been written yet.<br>The author is too busy brewing research papers (and coffee).</p>
    <a href="/" class="cta">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Back to Home
    </a>
    <p class="hint">
      其实我还没开始写 blog 🤷‍♂️<br>
      <em>…but the idea is brewing. Pun intended.</em>
    </p>
  </div>

  <div class="footer">© 2026 Ji-Zhe Zhou</div>

  <script>
    // Generate floating coffee beans
    (function () {
      var emojis = ['☕', '🫘', '✨', '📝', '💡'];
      var container = document.getElementById('beans');
      for (var i = 0; i < 25; i++) {
        var span = document.createElement('span');
        span.className = 'bean';
        span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        span.style.left = Math.random() * 100 + '%';
        span.style.animationDuration = (12 + Math.random() * 18) + 's';
        span.style.animationDelay = -(Math.random() * 20) + 's';
        span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        container.appendChild(span);
      }
    })();
  </script>
</body>
</html>
