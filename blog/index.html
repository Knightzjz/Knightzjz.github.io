<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>0x194 — Blog | Ji-Zhe Zhou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      padding: 2rem 1rem;
    }

    /* Floating emojis */
    .beans {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bean {
      position: absolute;
      font-size: 1.6rem;
      opacity: 0.12;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.12; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      text-align: center;
      z-index: 1;
      padding: 2rem 1.5rem;
      max-width: 760px;
      width: 100%;
    }

    .code {
      font-size: clamp(6rem, 16vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #2563eb 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      user-select: none;
    }

    .subtitle {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }

    /* Photo card — same max-width as container for alignment */
    .photo-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(30, 41, 59, 0.12), 0 8px 24px rgba(30, 41, 59, 0.06);
      overflow: hidden;
      margin: 0 auto 2.5rem;
      width: 100%;
      border: 1px solid rgba(226, 232, 240, 0.8);
    }

    .photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #e2e8f0;
      overflow: hidden;
    }

    .photo-placeholder {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(18px) saturate(1.1);
      transform: scale(1.05);
      transition: opacity 0.6s ease;
    }

    .photo-real {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .photo-real.loaded {
      opacity: 1;
    }

    .photo-wrap:has(.photo-real.loaded) .photo-placeholder {
      opacity: 0;
    }

    .photo-caption {
      padding: 1.4rem 1.6rem;
      text-align: left;
      background: #fff;
    }

    .photo-caption p {
      font-size: 1rem;
      color: #475569;
      line-height: 1.7;
    }

    .photo-caption .loc {
      font-size: 0.85rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.6rem;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .cta:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .hint {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .hint em {
      font-style: normal;
      color: #64748b;
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #cbd5e1;
      z-index: 1;
      text-align: center;
    }

    @media (max-width: 640px) {
      .container { padding: 1.5rem 1rem; }
      .photo-caption { padding: 1.1rem 1.2rem; }
      .photo-caption p { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <!-- Floating emojis -->
  <div class="beans" id="beans"></div>

  <div class="container">
    <div class="code">0x194</div>
    <p class="subtitle">Blog Coming Soon</p>
    <div class="photo-card">
      <div class="photo-wrap">
        <div class="photo-placeholder" style="background-image: url('seaside-tiny.jpg');"></div>
        <picture>
          <source media="(max-width: 640px)" srcset="seaside-800.webp">
          <img
            src="seaside-1400.webp"
            alt="Seaside tram and blue sky — Busan Cheongsapo"
            class="photo-real"
            loading="lazy"
            decoding="async"
            onload="this.classList.add('loaded')"
            width="1400"
            height="788">
        </picture>
      </div>
      <div class="photo-caption">
        <p>I haven't started writing my blog yet —<br>I went to the sea instead.<br>You can take this time to Eat More first. 🐟</p>
        <span class="loc">📍 Busan · Cheongsapo</span>
      </div>
    </div>

    <a href="/" class="cta">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Back to Home
    </a>
    <p class="hint">
      <em>…but the idea is brewing. Pun intended.</em>
    </p>

    <div class="footer">© 2026 Ji-Zhe Zhou</div>
  </div>

  <script>
    // Generate floating emojis
    (function () {
      var emojis = ['✨', '🌊', '🐚', '☀️', '📝'];
      var container = document.getElementById('beans');
      for (var i = 0; i < 25; i++) {
        var span = document.createElement('span');
        span.className = 'bean';
        span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        span.style.left = Math.random() * 100 + '%';
        span.style.animationDuration = (12 + Math.random() * 18) + 's';
        span.style.animationDelay = -(Math.random() * 20) + 's';
        span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        container.appendChild(span);
      }
    })();
  </script>
</body>
</html>
