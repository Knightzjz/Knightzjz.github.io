name: Update Citations

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch citation count
        id: fetch
        shell: bash
        run: |
          set -euo pipefail

          # Fetch Google Scholar profile page
          html="$(curl \
            --fail \
            --retry 3 \
            --silent \
            --show-error \
            -A 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
            'https://scholar.google.com/citations?user=-cNWmJMAAAAJ')"

          # Extract total citations
          citations="$(printf '%s' "$html" |
            grep -oP 'Cited by \K[\d,]+' |
            head -n 1 |
            tr -d ',[:space:]')"

          # Validate: must be a positive integer
          if ! [[ "$citations" =~ ^[0-9]+$ ]]; then
            echo "::warning::Invalid citation count '$citations'; skipping update"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "count=$citations" >> "$GITHUB_OUTPUT"

      - name: Update citations.json
        if: steps.fetch.outputs.skip != 'true'
        env:
          CITATIONS: ${{ steps.fetch.outputs.count }}
        run: |
          mkdir -p _data
          printf '{"citations": "%s", "updated": "%s"}\n' \
            "$CITATIONS" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > _data/citations.json

      - name: Commit and push changes
        if: steps.fetch.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/citations.json
          git diff --staged --quiet || git commit -m "Update citation count [skip ci]"
          git push
