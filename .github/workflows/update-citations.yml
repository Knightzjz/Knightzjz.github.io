name: Update Scholar Citations

on:
  schedule:
    # Once a day at 00:00 UTC → 08:00 Beijing.
    # SerpAPI free tier = 100 searches/month, so 1 run/day (~31/month)
    # keeps us far below the cap with headroom for manual re-runs.
    - cron: '0 0 * * *'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize with the stars workflow — if stars is still running,
    # this one waits instead of producing a non-fast-forward push conflict.
    concurrency:
      group: site-data
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch citations via SerpAPI
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/fetch_citations.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add citations.json
          if git diff --cached --quiet; then
            echo "No change, skipping commit."
          else
            git commit -m "chore: update scholar citations [skip ci]"
            git push
          fi
