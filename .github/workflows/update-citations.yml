name: Update Scholar Citations

on:
  schedule:
    # Once daily at 08:00 UTC (16:00 Beijing time)
    - cron: '0 8 * * *'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch citations via SerpAPI
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/fetch_citations.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add citations.json
          if git diff --cached --quiet; then
            echo "No change, skipping commit."
          else
            git commit -m "chore: update scholar citations [skip ci]"
            git push
          fi
