name: Update GitHub Stars

on:
  schedule:
    # Every 8 hours, offset 15 min from citations (UTC): 0:15, 8:15, 16:15
    # The 15-min stagger + concurrency group prevents non-fast-forward push
    # conflicts when both workflows are scheduled near the same wall-clock time.
    - cron: '15 */8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: site-data
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch star counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_stars.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stars.json
          if git diff --cached --quiet; then
            echo "No change, skipping commit."
          else
            git commit -m "chore: update github stars [skip ci]"
            git push
          fi
